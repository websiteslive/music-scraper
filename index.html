<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --accent-color: #38bdf8; }
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); padding: 2rem; border-radius: 20px; width: 100%; max-width: 600px; }
        
        #console { background: #000; color: #0f0; font-family: monospace; padding: 10px; height: 150px; overflow-y: auto; border-radius: 8px; margin-top: 1rem; font-size: 0.8rem; }
        .track-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 0.5rem; margin: 5px 0; border-radius: 8px; }
        button { width: 100%; padding: 10px; background: var(--accent-color); border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Spooled</h1>
    <input type="text" id="url-input" placeholder="Paste link..." style="width:100%; padding:10px; border-radius:8px;">
    <button onclick="startDownload()">Start Processing</button>
    
    <div id="progress-container" style="margin-top:20px; height:8px; background:#333; display:none;">
        <div id="progress-bar" style="height:100%; width:0%; background:var(--accent-color);"></div>
    </div>

    <div id="console"></div>
    <div id="track-list"></div>
    <a id="zip-btn" href="https://music-scraper-d72w.onrender.com/zip" style="display:none; text-align:center; display:block; margin-top:20px; color:var(--accent-color);">Download All (ZIP)</a>
</div>

// ... (Your CSS and HTML structure remain the same)

<script>
    const BACKEND_URL = "https://music-scraper-d72w.onrender.com";
    const consoleDiv = document.getElementById('console');
    let renderedFiles = new Set();

    function logToConsole(msg) {
        consoleDiv.innerHTML += `<div>> ${msg}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    async function startDownload() {
        const inputUrl = document.getElementById('url-input').value;
        if (!inputUrl) {
            alert("Please enter a URL first!");
            return;
        }

        logToConsole("Sending request for: " + inputUrl);
        
        // Corrected Fetch: sending the URL in the body
        const res = await fetch(`${BACKEND_URL}/start`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: inputUrl }) 
        });
        
        const data = await res.json();
        logToConsole("Server response: " + data.status);
        
        document.getElementById('progress-container').style.display = "block";

        let interval = setInterval(async () => {
            const res = await fetch(`${BACKEND_URL}/status`);
            const data = await res.json();
            
            document.getElementById('progress-bar').style.width = (data.count / 192) * 100 + "%";

            data.files.forEach(filename => {
                if(!renderedFiles.has(filename)) {
                    logToConsole("Found: " + filename);
                    renderTrack(filename);
                    renderedFiles.add(filename);
                }
            });

            if(!data.running) {
                clearInterval(interval);
                logToConsole("Process complete.");
                document.getElementById('zip-btn').style.display = "block";
            }
        }, 3000);
    }

    function renderTrack(filename) {
        const list = document.getElementById('track-list');
        list.innerHTML += `
            <div class="track-item">
                <span style="font-size:0.7rem; width:150px; overflow:hidden;">${filename}</span>
                <audio controls src="${BACKEND_URL}/download/${filename}"></audio>
                <a href="${BACKEND_URL}/download/${filename}" download>Save</a>
            </div>
        `;
    }
</script>
</body>
</html>
