<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDown | Spooler</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --accent-color: #38bdf8; }
        body { margin: 0; font-family: system-ui, sans-serif; background: radial-gradient(#1e293b, #0f172a); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); padding: 2rem; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        #console { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 10px; height: 150px; overflow-y: auto; border-radius: 8px; margin: 1rem 0; font-size: 0.8rem; border: 1px solid #334155; }
        .track-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 0.5rem; margin: 5px 0; border-radius: 8px; }
        input { width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 1rem; background: var(--accent-color); border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #zip-btn { display:none; background: #10b981; color: white; padding: 10px; text-align: center; border-radius: 8px; text-decoration: none; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Spooled</h1>
    <input type="text" id="url-input" placeholder="https://open.spotify.com/playlist/...">
    <button onclick="startDownload()">Start Processing</button>
    
    <div id="progress-container" style="margin-top:20px; height:8px; background:#333; display:none; border-radius:4px;">
        <div id="progress-bar" style="height:100%; width:0%; background:var(--accent-color); transition: width 0.5s;"></div>
    </div>

    <div id="console">Initializing console...</div>
    <div id="track-list"></div>
    <a id="zip-btn" href="https://music-scraper-d72w.onrender.com/zip">Download All (ZIP)</a>
</div>

<script>
    const BACKEND_URL = "https://music-scraper-d72w.onrender.com";
    const consoleDiv = document.getElementById('console');
    let renderedFiles = new Set();

    function logToConsole(msg) {
        consoleDiv.innerHTML += `<div>> ${msg}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    async function startDownload() {
        const inputUrl = document.getElementById('url-input').value;
        if (!inputUrl) return alert("Please enter a URL");

        logToConsole("Requesting: " + inputUrl);
        const res = await fetch(`${BACKEND_URL}/start`, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ url: inputUrl }) 
        });
        
        const data = await res.json();
        logToConsole("Status: " + data.status);
        document.getElementById('progress-container').style.display = "block";

        let interval = setInterval(async () => {
            const res = await fetch(`${BACKEND_URL}/status`);
            const data = await res.json();
            
            document.getElementById('progress-bar').style.width = (data.count / 192) * 100 + "%";

            data.files.forEach(filename => {
                if(!renderedFiles.has(filename)) {
                    logToConsole("Found: " + filename);
                    renderTrack(filename);
                    renderedFiles.add(filename);
                }
            });

            if(!data.running) {
                clearInterval(interval);
                logToConsole("Process complete.");
                document.getElementById('zip-btn').style.display = "block";
            }
        }, 3000);
    }

    function renderTrack(filename) {
        document.getElementById('track-list').innerHTML += `
            <div class="track-item">
                <span style="font-size:0.7rem; width:150px; overflow:hidden;">${filename}</span>
                <audio controls src="${BACKEND_URL}/download/${filename}"></audio>
                <a href="${BACKEND_URL}/download/${filename}" download style="font-size:0.8rem;">Save</a>
            </div>
        `;
    }
</script>
</body>
</html>
