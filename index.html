<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDown</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 { margin: 0 0 0.5rem; font-weight: 700; font-size: 1.5rem; }
        p { color: var(--text-muted); margin-bottom: 2rem; }

        input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: var(--accent-color);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        #progress-container {
            margin-top: 2rem;
            height: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        #progress-bar {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Spooled</h1>
    <p>Paste your link to begin transfer.</p>
    <input type="text" id="url-input" placeholder="https://open.spotify.com/track/...">
    <button onclick="startDownload()">Start Processing</button>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://music-scraper-d72w.onrender.com";

    async function startDownload() {
        const input = document.getElementById('url-input').value;
        const btn = document.querySelector('button');
        const progContainer = document.getElementById('progress-container');
        const progBar = document.getElementById('progress-bar');

        if(!input) return alert("Please enter a URL");

        btn.disabled = true;
        btn.innerText = "Initializing...";
        progContainer.style.display = "block";

        try {
            // Call your backend
            await fetch(`${BACKEND_URL}/start`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: input }) 
            });

            // Start polling for status
            let interval = setInterval(async () => {
                const res = await fetch(`${BACKEND_URL}/status`);
                const data = await res.json();
                
                const percentage = (data.count / 192) * 100;
                progBar.style.width = percentage + "%";

                if(!data.running) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.innerText = "Finished!";
                }
            }, 3000);
        } catch (error) {
            console.error("Error:", error);
            alert("Failed to reach the backend.");
            btn.disabled = false;
            btn.innerText = "Start Processing";
        }
    }
</script>
</body>
</html>
